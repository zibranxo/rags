# RAGS — Retrieval Augmentation System
# Config managed by pydantic-settings: .env for secrets, config.yaml for hyperparameters

api_keys:
  nim_api_key: "${NIM_API_KEY}"
  openrouter_api_key: "${OPENROUTER_API_KEY}"

providers:
  default: nim
  ollama_model: "${OLLAMA_MODEL:llama3.2}"

chunking:
  child_chunk_size: 300
  parent_chunk_size: 1000
  semantic_threshold_percentile: 0.95

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  rerank_top_k: 8
  final_top_k: 5
  mmr_lambda: 0.7
  rrf_k: 60

embedding:
  model: BAAI/bge-m3
  batch_size: 16

generation:
  nim_model: "meta/llama-3.3-70b-instruct"
  temperature: 0.1
  max_tokens: 1024